global:
  title: Default Config for MacroHero
  width: 800
  height: 600
  variables:
    playerName:
      eval: Local.value('playerName', 'myGlobalVarPlayerName')
    token:
      value: 996ed434-a22c-4510-aa82-9df34820c0be
pages:
  - label: Google Sheets
    variables:
      sheetValue:
        eval: GoogleSheets.getValue('Xalithra Général', 'G26:I26')
    layout:
      - type: title
        text: Google Sheets Integration
      - type: text
        text: Read data from Google Sheets (read-only)
      - type: divider
      - type: title
        text: '{sheetValue}'
      - type: text
        text: '{sheetValue}'
      - type: row
        children:
          - type: value
            var: sheetValue
            label: Cell Value
  - label: Conditions
    variables:
      isBandaged:
        eval: ConditionMarkers.hasCondition(token, 'Bandaged')
      conditionValue:
        eval: ConditionMarkers.getValue(token, 'Bandaged')
    layout:
      - type: title
        text: Condition Markers
      - type: text
        text: Check and read condition markers on tokens
      - type: divider
      - type: row
        children:
          - type: value
            var: isBandaged
            label: Has Bandaged?
          - type: value
            var: conditionValue
            label: Bandaged Value
      - type: button
        label: Check Condition
        onclick:
          - 'isBandaged ? console.log(''Has Bandaged condition'') : console.log(''No Bandaged condition'');'
      - type: divider
      - type: title
        text: Manage Conditions
      - type: button
        label: Toggle Bandage
        onclick:
          - await ConditionMarkers.toggleCondition(token, 'Bandaged');
      - type: button
        label: Increment Bandage
        onclick:
          - await ConditionMarkers.addCondition(token, 'Bandaged', conditionValue + 1);
      - type: button
        label: Remove Bandage
        onclick:
          - await ConditionMarkers.removeCondition(token, 'Bandaged');
      - type: button
        label: Clear All Conditions
        onclick:
          - await ConditionMarkers.clearAllConditions(token);
      - type: divider
      - type: title
        text: Common Conditions
      - type: row
        children:
          - type: button
            label: Poisoned
            onclick:
              - await ConditionMarkers.addCondition(token, 'Poisoned');
          - type: button
            label: Paralyzed
            onclick:
              - await ConditionMarkers.addCondition(token, 'Paralysed');
          - type: button
            label: Fainted
            onclick:
              - await ConditionMarkers.addCondition(token, 'Fainted');
  - label: Trackers
    variables:
      trackerHP:
        eval: OwlTrackers.getValue(token, 'HP')
      trackerMaxHP:
        eval: OwlTrackers.getMax(token, 'HP')
    layout:
      - type: title
        text: Owl Trackers
      - type: text
        text: Get and modify tracker values on tokens
      - type: divider
      - type: row
        children:
          - type: value
            var: trackerHP
            label: HP
          - type: value
            var: trackerMaxHP
            label: Max HP
      - type: divider
      - type: title
        text: HP Management
      - type: row
        children:
          - type: button
            label: Heal 10
            onclick:
              - await OwlTrackers.addValue(token, 'HP', 10);
          - type: button
            label: Heal 5
            onclick:
              - await OwlTrackers.addValue(token, 'HP', 5);
          - type: button
            label: Full Heal
            onclick:
              - await OwlTrackers.setValue(token, 'HP', trackerMaxHP);
      - type: row
        children:
          - type: button
            label: Damage 5
            onclick:
              - await OwlTrackers.addValue(token, 'HP', -5);
          - type: button
            label: Damage 10
            onclick:
              - await OwlTrackers.addValue(token, 'HP', -10);
          - type: button
            label: Down to 0
            onclick:
              - await OwlTrackers.setValue(token, 'HP', 0);
      - type: divider
      - type: title
        text: Add Tracker
      - type: button
        label: Add HP Tracker (50/50)
        onclick:
          - |-
            await OwlTrackers.addTracker(token, {
              variant: 'value-max',
              name: 'HP',
              value: 50,
              max: 50,
              color: 2
            });
      - type: button
        label: Add Temp HP (10)
        onclick:
          - |-
            await OwlTrackers.addTracker(token, {
              variant: 'value',
              name: 'Temp HP',
              value: 10,
              color: 5
            });
      - type: button
        label: Remove HP Tracker
        onclick:
          - await OwlTrackers.removeTracker(token, 'HP');
  - label: StatBubbles
    variables:
      bubbleHealth:
        eval: StatBubbles.getValue(token, 'health')
      bubbleMaxHealth:
        eval: StatBubbles.getValue(token, 'max health')
      bubbleAC:
        eval: StatBubbles.getValue(token, 'armor class')
    layout:
      - type: title
        text: StatBubbles
      - type: text
        text: Manage health, AC, and temp HP via StatBubbles extension
      - type: divider
      - type: row
        children:
          - type: value
            var: bubbleHealth
            label: Health
          - type: value
            var: bubbleMaxHealth
            label: Max
          - type: value
            var: bubbleAC
            label: AC
      - type: divider
      - type: title
        text: Health Management
      - type: row
        children:
          - type: button
            label: Heal 15
            onclick:
              - await StatBubbles.heal(token, 15);
          - type: button
            label: Heal 5
            onclick:
              - await StatBubbles.heal(token, 5);
          - type: button
            label: Full Heal
            onclick:
              - await StatBubbles.setValue(token, 'health', bubbleMaxHealth);
      - type: row
        children:
          - type: button
            label: Damage 8
            onclick:
              - await StatBubbles.damage(token, 8);
          - type: button
            label: Damage 15
            onclick:
              - await StatBubbles.damage(token, 15);
          - type: button
            label: Down to 0
            onclick:
              - await StatBubbles.setValue(token, 'health', 0);
      - type: divider
      - type: title
        text: Other Stats
      - type: row
        children:
          - type: button
            label: Set Temp HP 20
            onclick:
              - await StatBubbles.setValue(token, 'temporary health', 20);
          - type: button
            label: Remove Temp HP
            onclick:
              - await StatBubbles.setValue(token, 'temporary health', 0);
      - type: row
        children:
          - type: button
            label: AC +2
            onclick:
              - await StatBubbles.addValue(token, 'armor class', 2);
          - type: button
            label: AC -2
            onclick:
              - await StatBubbles.addValue(token, 'armor class', -2);
          - type: button
            label: Show Health %
            onclick:
              - |-
                const percentage = await StatBubbles.getHealthPercentage(token);
                console.log('Health: ' + percentage + '%');
      - type: divider
      - type: title
        text: Combat Example
      - type: button
        label: Attack Roll (DC 15, 10 dmg)
        onclick:
          - |-
            const roll = await JustDices.rollSilent('1d20 + ' + bubbleAC);
            if (roll > 15) {
              await StatBubbles.damage(token, 10);
              console.log('Attack hit for 10 damage!');
            } else {
              console.log('Attack missed!');
            }
  - label: Rings
    variables:
      ringColors:
        eval: ColoredRings.getRings(token)
      hasBlueRing:
        eval: ColoredRings.hasRing(token, '#1a6aff')
    layout:
      - type: title
        text: Colored Rings
      - type: text
        text: Add and remove colored status rings on tokens
      - type: divider
      - type: row
        children:
          - type: value
            var: hasBlueRing
            label: Has Blue Ring?
      - type: divider
      - type: title
        text: Add Rings
      - type: row
        children:
          - type: button
            label: Add Blue
            onclick:
              - await ColoredRings.addRing(token, '#1a6aff');
          - type: button
            label: Add Orange
            onclick:
              - await ColoredRings.addRing(token, '#ff7433');
          - type: button
            label: Add Green
            onclick:
              - await ColoredRings.addRing(token, '#00ff00');
      - type: row
        children:
          - type: button
            label: Add Red
            onclick:
              - await ColoredRings.addRing(token, '#ff0000');
          - type: button
            label: Add Yellow
            onclick:
              - await ColoredRings.addRing(token, '#ffff00');
          - type: button
            label: Add Purple
            onclick:
              - await ColoredRings.addRing(token, '#ff00ff');
      - type: divider
      - type: title
        text: Remove Rings
      - type: row
        children:
          - type: button
            label: Remove Blue
            onclick:
              - await ColoredRings.removeRing(token, '#1a6aff');
          - type: button
            label: Remove Orange
            onclick:
              - await ColoredRings.removeRing(token, '#ff7433');
          - type: button
            label: Remove Green
            onclick:
              - await ColoredRings.removeRing(token, '#00ff00');
      - type: button
        label: Show All Rings
        onclick:
          - |-
            const rings = await ColoredRings.getRings(token);
            console.log('Current rings:', rings);
  - label: PrettySordid
    variables:
      prettyHasInitiative:
        eval: PrettySordid.hasInitiative(token)
      prettyInitiativeCount:
        eval: PrettySordid.getInitiative(token)
      prettyActive:
        eval: PrettySordid.isActiveTurn(token)
    layout:
      - type: title
        text: Pretty Sordid Initiative
      - type: text
        text: Compatibility for the PrettySordid / Pretty Initiative extension — read and modify initiative stored in token metadata.
      - type: divider
      - type: row
        children:
          - type: value
            var: prettyHasInitiative
            label: Has Initiative?
          - type: value
            var: prettyInitiativeCount
            label: Initiative
          - type: value
            var: prettyActive
            label: Active?
      - type: divider
      - type: title
        text: Manage Initiative
      - type: row
        children:
          - type: button
            label: Increment / Assign 1
            onclick:
              - 'await PrettySordid.hasInitiative(token) ? await PrettySordid.setInitiative(token, await PrettySordid.getInitiative(token) + 1) : await PrettySordid.setInitiative(token, 1);'
          - type: button
            label: Decrement
            onclick:
              - 'await PrettySordid.hasInitiative(token) ? await PrettySordid.setInitiative(token, await PrettySordid.getInitiative(token) - 1) : null;'
          - type: button
            label: Reset to 0
            onclick:
              - await PrettySordid.setInitiative(token, 0);
      - type: divider
      - type: title
        text: Quick Set
      - type: row
        children:
          - type: button
            label: Roll Initiative (+3)
            onclick:
              - |-
                const roll = await JustDices.rollSilent('1d20 + 3');
                await PrettySordid.setInitiative(token, roll);
                console.log('Initiative set to:', roll);
          - type: button
            label: Set to 20
            onclick:
              - await PrettySordid.setInitiative(token, 20);
          - type: button
            label: Set to 10
            onclick:
              - await PrettySordid.setInitiative(token, 10);
      - type: divider
      - type: title
        text: Remove Initiative
      - type: button
        label: Remove All Initiative Data
        onclick:
          - |-
            await PrettySordid.removeInitiative(token);
            console.log('Initiative metadata removed');
  - label: JustDices
    variables:
      token:
        value: 996ed434-a22c-4510-aa82-9df34820c0be
    layout:
      - type: title
        text: JustDices
      - type: text
        text: Roll dice and get results in Owlbear Rodeo
      - type: divider
      - type: title
        text: Basic Rolls
      - type: row
        children:
          - type: button
            label: Roll d20
            onclick:
              - await JustDices.roll('1d20');
          - type: button
            label: Roll d12
            onclick:
              - await JustDices.roll('1d12');
          - type: button
            label: Roll d10
            onclick:
              - await JustDices.roll('1d10');
      - type: row
        children:
          - type: button
            label: Roll d8
            onclick:
              - await JustDices.roll('1d8');
          - type: button
            label: Roll d6
            onclick:
              - await JustDices.roll('1d6');
          - type: button
            label: Roll d4
            onclick:
              - await JustDices.roll('1d4');
      - type: divider
      - type: title
        text: With Modifiers
      - type: row
        children:
          - type: button
            label: d20 + 5
            onclick:
              - await JustDices.roll('1d20 + 5');
          - type: button
            label: 2d6 + 3
            onclick:
              - await JustDices.roll('2d6 + 3');
          - type: button
            label: 3d6
            onclick:
              - await JustDices.roll('3d6');
      - type: divider
      - type: title
        text: Damage Rolls
      - type: row
        children:
          - type: button
            label: Greatsword (2d6+4)
            onclick:
              - await JustDices.roll('2d6 + 4');
          - type: button
            label: Longsword (1d8+3)
            onclick:
              - await JustDices.roll('1d8 + 3');
          - type: button
            label: Fireball (8d6)
            onclick:
              - await JustDices.roll('8d6');
      - type: divider
      - type: title
        text: Silent Rolls (for logic)
      - type: button
        label: Silent Roll + Logic
        onclick:
          - |-
            const roll = await JustDices.rollSilent('1d20');
            if (roll >= 15) {
              console.log('Success! (' + roll + ')');
            } else {
              console.log('Failure! (' + roll + ')');
            }
      - type: button
        label: Get Roll Object
        onclick:
          - |-
            const rollObj = await JustDices.getRollObjectSilent('1d20 + 5');
            console.log('Roll object:', rollObj);
  - label: Local
    variables:
      inputName:
        value: Enter name here
    layout:
      - type: title
        text: Local Storage
      - type: text
        text: Store and retrieve values in browser localStorage
      - type: divider
      - type: input
        var: inputName
        label: Enter Name
        placeholder: Type a name...
      - type: row
        children:
          - type: button
            label: Show Global Name
            onclick:
              - 'await JustDices.roll(''Global Player Name: '' + playerName);'
          - type: button
            label: Show Input Name
            onclick:
              - 'await JustDices.roll(''Input Name: '' + inputName);'
      - type: divider
      - type: title
        text: Save & Retrieve
      - type: button
        label: Save Input as Player Name
        onclick:
          - await Local.set('playerName', inputName);
      - type: button
        label: Show Saved Player Name
        onclick:
          - 'await JustDices.roll(''Player: '' + await Local.value(''playerName'', ''Unknown''));'
      - type: button
        label: List All Keys
        onclick:
          - |-
            const keys = await Local.keys();
            console.log('Stored keys:', keys);
      - type: button
        label: Clear All Storage
        onclick:
          - |-
            await Local.clear();
            console.log('Local storage cleared');
      - type: divider
      - type: title
        text: Examples
      - type: button
        label: Increment Counter
        onclick:
          - |-
            await Local.set('counter', (await Local.value('counter', 0)) + 1);
            const count = await Local.value('counter', 0);
            console.log('Counter:', count);
      - type: button
        label: Save Last Roll
        onclick:
          - |-
            await Local.set('lastRoll', await JustDices.rollSilent('1d20'));
            console.log('Saved last roll:', await Local.value('lastRoll', 0));
  - label: Weather
    variables:
      token:
        value: 996ed434-a22c-4510-aa82-9df34820c0be
    layout:
      - type: title
        text: Weather Effects
      - type: text
        text: Add weather effects to maps
      - type: divider
      - type: title
        text: Weather Types
      - type: row
        children:
          - type: button
            label: Snow
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'SNOW', speed: 2, density: 3 });
          - type: button
            label: Rain
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'RAIN', speed: 3, density: 4 });
          - type: button
            label: Sand
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'SAND', speed: 2, density: 3 });
      - type: row
        children:
          - type: button
            label: Fire
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'FIRE', speed: 1, density: 2 });
          - type: button
            label: Cloud
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'CLOUD', speed: 1, density: 3 });
          - type: button
            label: Bloom
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'BLOOM', speed: 1, density: 2 });
      - type: row
        children:
          - type: button
            label: Energy Storm
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'ENERGYSTORM', speed: 2, density: 3 });
          - type: button
            label: Water
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'WATER', speed: 1, density: 2 });
          - type: button
            label: Current
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.setWeather(mapId, { type: 'CURRENT', speed: 2, density: 3 });
      - type: divider
      - type: title
        text: Weather Tints
      - type: row
        children:
          - type: button
            label: Blue Tint
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.updateWeather(mapId, { tint: '#88aaff' });
          - type: button
            label: Orange Tint
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.updateWeather(mapId, { tint: '#ff8844' });
          - type: button
            label: Green Tint
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.updateWeather(mapId, { tint: '#88ff88' });
      - type: divider
      - type: title
        text: Controls
      - type: row
        children:
          - type: button
            label: Show Config
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                const config = await Weather.getWeather(mapId);
                console.log('Weather config:', config);
          - type: button
            label: Check Weather
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                const has = await Weather.hasWeather(mapId);
                console.log('Has weather:', has);
          - type: button
            label: Remove Weather
            onclick:
              - |-
                const mapId = await Scene.getMapIdFromToken(token);
                await Weather.removeWeather(mapId);
  - label: Embers
    variables:
      caster:
        value: 996ed434-a22c-4510-aa82-9df34820c0be
      target:
        value: target-token-id
    layout:
      - type: title
        text: Embers - Spell Effects
      - type: text
        text: Visual spell effects using Embers extension with fluent API
      - type: divider
      - type: title
        text: Quick Single Effects
      - type: text
        text: Simple one-off spell effects
      - type: row
        children:
          - type: button
            label: Magic Missile
            onclick:
              - |-
                await Embers.sequence()
                  .projectile('magic_missile', caster, await Token.getSelected(), { copies: 3 })
                  .cast({ spellName: 'Magic Missile' });
          - type: button
            label: Cure Wounds (AOE)
            onclick:
              - |-
                await Embers.sequence()
                  .aoe('cure_wounds', await Token.getSelected(), { size: 2 })
                  .cast({ spellName: 'Cure Wounds' });
          - type: button
            label: Shield
            onclick:
              - |-
                await Embers.sequence()
                  .aoe('shield.hit', caster, { size: 2 })
                  .cast({ spellName: 'Shield' });
      - type: divider
      - type: title
        text: Simultaneous Effects
      - type: text
        text: Multiple effects playing at the same time (without .then())
      - type: row
        children:
          - type: button
            label: 2 Projectiles (Simultaneous)
            onclick:
              - |-
                await Embers.sequence()
                  .projectile('magic_missile', caster, [await Token.getSelected()])
                  .projectile('fire_bolt', caster, await Token.getSelected())
                  .cast({ spellName: 'Double Attack' });
          - type: button
            label: 2 AOEs (Simultaneous)
            onclick:
              - |-
                await Embers.sequence()
                  .aoe('shield.complete', caster, { size: 6 })
                  .aoe('fireball.explosion', await Token.getSelected(), { size: 4 })
                  .cast({ spellName: 'Blessings' });
      - type: divider
      - type: title
        text: Sequential Effects (with .then())
      - type: text
        text: Effects queue up - next waits for previous to finish
      - type: button
        label: Projectile → Impact
        onclick:
          - |-
            await Embers.sequence()
              .projectile('magic_missile', caster, await Token.getSelected())
              .then()
              .aoe('generic.impact.fire', await Token.getSelected(), { size: 4 })
              .cast({ spellName: 'Missile Impact' });
      - type: button
        label: Fireball → Explosion → Knockback
        onclick:
          - |-
            await Embers.sequence()
              .projectile('fireball.beam', caster, await Token.getSelected())
              .then()
              .aoe('fireball.explosion', await Token.getSelected(), { size: 6 })
              .then()
              .action('slide', [await Token.getSelected(), { x: await Token.getSelected().x + 100, y: await Token.getSelected().y }, 500])
              .cast({ spellName: 'Fireball Chain' });
      - type: divider
      - type: title
        text: Cone Effects
      - type: row
        children:
          - type: button
            label: Burning Hands
            onclick:
              - |-
                await Embers.sequence()
                  .cone('burning_hands', caster, await Token.getSelected(), { size: 6 })
                  .cast({ spellName: 'Burning Hands' });
          - type: button
            label: Cone of Cold
            onclick:
              - |-
                await Embers.sequence()
                  .cone('cone_of_cold', caster, await Token.getSelected(), { size: 8 })
                  .cast({ spellName: 'Cone of Cold' });
      - type: divider
      - type: title
        text: Delays
      - type: text
        text: Add timing delays between effects
      - type: button
        label: Arrow (then 300ms delay) → Impact
        onclick:
          - |-
            await Embers.sequence()
              .projectile('generic.weapon_attacks.ranged.arrow.green', caster, await Token.getSelected())
              .delay(300)
              .aoe('generic.impact.fire', await Token.getSelected(), { size: 3 })
              .cast({ spellName: 'Delayed Impact' });
      - type: button
        label: Cast → Projectile → Hit (with delays)
        onclick:
          - |-
            await Embers.sequence()
              .aoe('moonbeam.intro', caster, { size: 2 })
              .delay(500)
              .projectile('magic_missile', caster, await Token.getSelected())
              .delay(200)
              .aoe('generic.impact.fire', await Token.getSelected(), { size: 5 })
              .cast({ spellName: 'Energy Casting' });
      - type: divider
      - type: title
        text: Complex Sequences
      - type: text
        text: Showcase fluent API chains
      - type: button
        label: Multi-Projectile Barrage
        onclick:
          - |-
            await Embers.sequence()
              .projectile('magic_missile', caster, await Token.getSelected(), { copies: 2 })
              .projectile('generic.weapon_attacks.ranged.arrow.white', caster, await Token.getSelected())
              .then()
              .aoe('fireball.explosion', await Token.getSelected(), { size: 5 })
              .then()
              .aoe('generic.smoke.fumes.grey.1.complete', await Token.getSelected(), { size: 6 })
              .cast({ 
